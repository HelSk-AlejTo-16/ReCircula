apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recircula-backend-hpa
  namespace: recircula
  labels:
    app: recircula-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recircula-backend-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        # RNF-04: El HPA despliega nuevas instancias automáticamente
        # al superar el 70% de uso de CPU sostenido.
        averageUtilization: 70
