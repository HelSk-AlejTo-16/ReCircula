version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: recircula_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: marco
      POSTGRES_DB: ReCircula
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ReCircula"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    # Eliminamos 'container_name' para permitir el escalado horizontal (docker compose up --scale backend=N)
    restart: always
    # No exponemos el puerto 3000 del backend directamente al host para evitar conflictos al escalar
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=marco
      - DB_DATABASE=ReCircula
      - JWT_SECRET=super_secret_key
      - CORS_ORIGIN=*
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # RNF-02 / RNF-04: Chequeo de salud individual por instancia
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  load_balancer:
    image: nginx:alpine
    container_name: recircula_load_balancer
    restart: always
    ports:
      - "3000:3000" # El balanceador expone la API unificada hacia el exterior
    volumes:
      - ./nginx-load-balancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: recircula_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - load_balancer

volumes:
  pgdata:
