upstream backend_servers {
    # El DNS 'backend' en la red de Docker resolverá dinámicamente a las IPs
    # de todas las réplicas activas del contenedor backend.
    server backend:3000;
}

server {
    listen 3000;
    client_max_body_size 50M;

    location / {
        proxy_pass http://backend_servers;
        
        # Cabeceras estándar para proxy inverso y balanceo stateless
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Deshabilitar almacenamiento en búfer para respuestas rápidas
        proxy_buffering off;
    }
}
